<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>
    <h2>Input Data Video</h2>
    <input type="text" id="name" placeholder="Judul Video"><br>
    <input type="text" id="video_url" placeholder="Link Video URL"><br>
    <input type="text" id="thumbnail_url" placeholder="Link Thumbnail (Untuk Preview Link)"><br>
    <input type="text" id="access_code" placeholder="Access Code (Contoh: video)"><br>
    <button onclick="saveData()">Simpan Data</button>
    <div id="result"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        async function saveData() {
            const { error } = await client.from('videos_list').insert([{
                name: document.getElementById('name').value,
                video_url: document.getElementById('video_url').value,
                thumbnail_url: document.getElementById('thumbnail_url').value,
                access_code: document.getElementById('access_code').value
            }]);
            if (!error) {
                document.getElementById('result').innerHTML = "Sukses! Link: " + window.location.origin + "/player.html?folder=" + document.getElementById('access_code').value;
            } else {
                alert("Error: " + error.message);
            }
        }
    </script>
</body>
</html>
