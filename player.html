<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">      
<title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #player-area { width: 100%; max-width: 800px; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div id="player-area">Memuat...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        const params = new URLSearchParams(window.location.search);
        const code = params.get('folder');
        const isAuto = params.get('autoplay') === 'true';

        async function loadVideo() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (data) {
                // Di tab baru, video langsung autoplay dan muted agar lolos kebijakan browser
                const autoplayAttr = isAuto ? "autoplay muted" : "";
                document.getElementById('player-area').innerHTML = 
                    `<video src="${data.video_url}" controls ${autoplayAttr} playsinline style="width:100%;height:100%"></video>`;
            }
        }
        loadVideo();

        // LOGIKA KLIK:
        // Tab lama jadi iklan, tab baru jadi video
        document.body.addEventListener('click', function handler() {
            if (!isAuto) {
                // 1. Buka tab baru berisi video yang sama dengan mode autoplay
                window.open(`${window.location.pathname}?folder=${code}&autoplay=true`, '_blank');
                
                // 2. Tab lama berubah menjadi iklan
                window.location.replace(adUrl);
            } else {
                // 3. Jika sudah di tab video, setiap klik tetap membuka iklan di tab baru (popunder)
                window.open(adUrl, '_blank');
            }
        });
    </script>
</body>
</html>
