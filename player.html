<!DOCTYPE html>
<html lang="id">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">        
   <title>Loading...</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        
        /* Lapisan transparan yang menutupi seluruh layar */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; cursor: pointer; background: transparent;
        }

        /* Tampilan halaman "seperti biasa" */
        #content { padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <div id="content">
        <h1>Memuat Video...</h1>
        <p>Mohon tunggu sebentar.</p>
    </div>

    <script>
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        
        document.getElementById('overlay').addEventListener('click', () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('folder');
            
            // Buka video di tab baru
            window.open(`/watch.html?folder=${code}`, '_blank');
            
            // Ubah tab ini menjadi iklan
            window.location.replace(adUrl);
            
            // Hapus overlay agar klik selanjutnya normal (opsional)
            document.getElementById('overlay').style.display = 'none';
        });
    </script>
</body>
</html>
