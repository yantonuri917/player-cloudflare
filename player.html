<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        #player-area { width: 100%; aspect-ratio: 16/9; }
        video, iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="player-area">Memuat...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const code = new URLSearchParams(window.location.search).get('folder');

        async function init() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (data) {
                document.getElementById('player-area').innerHTML = data.video_url.includes('.mp4') 
                    ? `<video src="${data.video_url}" controls autoplay playsinline></video>`
                    : `<iframe src="${data.video_url}" allowfullscreen></iframe>`;
            }
        }
        init();
    </script>

    <script type="text/javascript">
        var _Hasync = _Hasync || [];
        _Hasync.push(['Histats.start','1,4971849,4,0,0,0,00000000']);
        _Hasync.push(['Histats.fasi','1']);
        _Hasync.push(['Histats.track_hits','']);
        (function() {
            var hs = document.createElement('script'); hs.async = true;
            hs.src = ('https:' == document.location.protocol ? 'https://' : 'http://') + 's10.histats.com/js15_as.js';
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(hs);
        })();
    </script>
</body>
</html>
