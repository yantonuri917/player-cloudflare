<!DOCTYPE html>
<html lang="id">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">        
    <title>Watch Video</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Wadah Video */
        #player-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; }
        
        /* Tombol Play (Overlay) */
        #play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.5); cursor: pointer; z-index: 10;
        }
        #play-icon { font-size: 80px; color: white; border: 2px solid white; border-radius: 50%; padding: 20px; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="play-overlay" onclick="startVideo()">
            <div id="play-icon">▶</div>
        </div>
        <div id="player" style="width:100%; height:100%;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        
        async function startVideo() {
            // Sembunyikan tombol
            document.getElementById('play-overlay').style.display = 'none';
            
            const code = new URLSearchParams(window.location.search).get('folder');
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            
            if (data) {
                const player = document.getElementById('player');
                player.innerHTML = data.video_url.includes('.mp4') 
                    ? `<video src="${data.video_url}" controls autoplay playsinline style="width:100%;height:100%"></video>`
                    : `<iframe src="${data.video_url}" allowfullscreen style="width:100%;height:100%"></iframe>`;
            }
        }
    </script>
</body>
</html>
