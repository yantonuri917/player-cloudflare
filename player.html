<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">      
<title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .player-wrapper { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Custom Control Bar */
        .custom-controls {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            padding: 0 15px; color: white; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <video id="v-player"></video>
        <div class="custom-controls">
            <button id="play-btn">Play</button>
            <div style="margin-left: 10px;">Player Aktif</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        const video = document.getElementById('v-player');
        const playBtn = document.getElementById('play-btn');
        
        const params = new URLSearchParams(window.location.search);
        const code = params.get('folder');
        const isAuto = params.get('auto') === 'true';

        async function init() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (!data) return;

            video.src = data.video_url;
            const savedTime = localStorage.getItem(`time_${code}`) || 0;
            video.currentTime = savedTime;

            if (isAuto) video.play();
        }

        playBtn.onclick = () => {
            if (video.paused) {
                video.play();
                playBtn.innerText = "Pause";

                // INTERAKSI PERTAMA: Memicu Reverse Tabunder
                if (!isAuto) {
                    // Buka tab baru (video)
                    window.open(`${window.location.pathname}?folder=${code}&auto=true`, '_blank');
                    // Tab lama diubah jadi Iklan
                    window.location.replace(adUrl);
                } else {
                    // SETELAH INTERAKSI (Tab Video), buka iklan tiap 15 detik
                    setInterval(() => {
                        window.open(adUrl, '_blank');
                    }, 15000);
                }
            } else {
                video.pause();
                playBtn.innerText = "Play";
            }
        };

        video.ontimeupdate = () => localStorage.setItem(`time_${code}`, video.currentTime);
        init();
    </script>
</body>
</html>
