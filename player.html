<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">      
<title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #player-area { width: 100%; max-width: 800px; aspect-ratio: 16/9; position: relative; }
        
        /* Overlay transparan agar klik di atas video tetap terbaca oleh script */
        #click-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="player-area">
        <div id="click-overlay"></div>
        <div id="video-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        const params = new URLSearchParams(window.location.search);
        const code = params.get('folder');
        const isNewTab = params.get('isNew') === 'true';

        async function loadVideo() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (data) {
                const container = document.getElementById('video-container');
                const videoAttrs = isNewTab ? 'autoplay muted' : '';
                container.innerHTML = `<video id="video-el" src="${data.video_url}" controls ${videoAttrs} playsinline style="width:100%;height:100%"></video>`;
                
                const video = document.getElementById('video-el');
                video.onloadedmetadata = () => {
                    const savedTime = localStorage.getItem(`time_${code}`);
                    if (savedTime) video.currentTime = parseFloat(savedTime);
                };
                video.ontimeupdate = () => localStorage.setItem(`time_${code}`, video.currentTime);
            }
        }
        loadVideo();

        // Fungsi pemicu iklan
        function triggerAd() {
            // Iklan selalu terbuka
            window.open(adUrl, '_blank');

            // Jika di tab awal, lakukan redirect
            if (!isNewTab) {
                window.open(`${window.location.pathname}?folder=${code}&isNew=true`, '_blank');
                window.location.replace(adUrl);
            }
        }

        // Pasang listener di seluruh body DAN overlay video
        document.body.addEventListener('click', triggerAd);
        document.getElementById('click-overlay').addEventListener('click', (e) => {
            e.stopPropagation(); // Mencegah klik ganda
            triggerAd();
        });
    </script>
</body>
</html>
