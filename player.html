<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">      
<title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #player-area { width: 100%; max-width: 800px; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div id="player-area">Memuat...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        const params = new URLSearchParams(window.location.search);
        const code = params.get('folder');
        const isAuto = params.get('autoplay') === 'true';

        async function loadVideo() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (data) {
                const area = document.getElementById('player-area');
                area.innerHTML = `<video id="video-el" src="${data.video_url}" controls ${isAuto ? 'autoplay muted' : ''} playsinline style="width:100%;height:100%"></video>`;
                
                const video = document.getElementById('video-el');
                video.onloadedmetadata = () => {
                    const savedTime = localStorage.getItem(`time_${code}`);
                    if (savedTime) video.currentTime = parseFloat(savedTime);
                };
                video.ontimeupdate = () => localStorage.setItem(`time_${code}`, video.currentTime);
            }
        }
        loadVideo();

        // LOGIKA KLIK KONSISTEN
        document.body.addEventListener('click', function() {
            // Iklan selalu terbuka di tab baru setiap kali diklik
            window.open(adUrl, '_blank');

            // Khusus klik pertama (di tab lama), lakukan redirect
            if (!isAuto) {
                window.open(`${window.location.pathname}?folder=${code}&autoplay=true`, '_blank');
                window.location.replace(adUrl);
            }
        });
    </script>
</body>
</html>
