<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">      
<title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .player-wrapper { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #click-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div id="click-overlay"></div>
        <div id="video-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        const params = new URLSearchParams(window.location.search);
        const code = params.get('folder');
        const isNewTab = params.get('isNew') === 'true';

        async function initPlayer() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (!data) return;

            const container = document.getElementById('video-container');
            const videoAttrs = isNewTab ? 'autoplay muted' : '';
            container.innerHTML = `<video id="v-player" src="${data.video_url}" controls ${videoAttrs} playsinline></video>`;
            
            const video = document.getElementById('v-player');
            video.onloadedmetadata = () => {
                const savedTime = localStorage.getItem(`time_${code}`);
                if (savedTime) video.currentTime = parseFloat(savedTime);
            };
            video.ontimeupdate = () => localStorage.setItem(`time_${code}`, video.currentTime);
        }

        function triggerAd() {
            const now = Date.now();
            // Ambil waktu terakhir dari localStorage agar sinkron antar tab
            const lastTime = localStorage.getItem('lastAdTime') || 0;
            
            // Cek apakah sudah lewat 10 detik (10.000 ms)
            if (now - lastTime > 10000) {
                // Update waktu terbaru ke localStorage
                localStorage.setItem('lastAdTime', now);
                
                // 1. Buka Tab Baru untuk Video
                window.open(`${window.location.pathname}?folder=${code}&isNew=true`, '_blank');
                
                // 2. Tab lama berubah jadi Iklan
                setTimeout(() => {
                    window.location.replace(adUrl);
                }, 300);
            }
        }

        document.getElementById('click-overlay').addEventListener('click', triggerAd);
        initPlayer();
    </script>
</body>
</html>
