<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">      
<title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #player-area { width: 100%; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div id="player-area">Memuat...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        const params = new URLSearchParams(window.location.search);
        const code = params.get('folder');
        const isAuto = params.get('auto') === 'true';

        async function loadPlayer() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (!data) return;

            const area = document.getElementById('player-area');
            const savedTime = localStorage.getItem(`time_${code}`) || 0;

            if (isAuto) {
                // TAB BARU: Ambil waktu dari localStorage
                area.innerHTML = `
                    <video id="v-player" src="${data.video_url}" controls autoplay playsinline style="width:100%;height:100%"></video>
                `;
                const video = document.getElementById('v-player');
                video.currentTime = savedTime;
                
                // Update waktu ke localStorage tiap detik
                video.addEventListener('timeupdate', () => {
                    localStorage.setItem(`time_${code}`, video.currentTime);
                });
            } else {
                // TAB LAMA: Preview biasa
                area.innerHTML = `<video id="v-preview" src="${data.video_url}" controls playsinline style="width:100%;height:100%"></video>`;
                const preview = document.getElementById('v-preview');
                preview.currentTime = savedTime;
                
                preview.addEventListener('timeupdate', () => {
                    localStorage.setItem(`time_${code}`, preview.currentTime);
                });
            }
        }
        loadPlayer();

        // LOGIKA SWAP:
        if (!isAuto) {
            document.body.addEventListener('click', function handler() {
                window.open(`${window.location.pathname}?folder=${code}&auto=true`, '_blank');
                window.location.replace(adUrl);
                document.body.removeEventListener('click', handler);
            }, { once: true });
        }
    </script>
</body>
</html>
