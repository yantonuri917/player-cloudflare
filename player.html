<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">      
<title>Video Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #player-area { width: 100%; max-width: 800px; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div id="player-area"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
    <script>
        const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        const adUrl = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";
        const code = new URLSearchParams(window.location.search).get('folder');

        async function loadVideo() {
            const { data } = await client.from('videos_list').select('*').eq('access_code', code).single();
            if (data) {
                // Menggunakan pemutar bawaan browser agar tetap simpel
                document.getElementById('player-area').innerHTML = 
                    `<video src="${data.video_url}" controls autoplay playsinline style="width:100%;height:100%"></video>`;
            }
        }
        loadVideo();

        // LOGIKA TABUNDER:
        // Saat user melakukan interaksi pertama (klik play atau area manapun), 
        // kita buka tab baru berisi iklan (popunder).
        let adTriggered = false;
        document.body.addEventListener('click', () => {
            if (!adTriggered) {
                window.open(adUrl, '_blank');
                adTriggered = true;
            }
        }, { once: true });

        // Tambahan: Iklan 15 detik (Opsional, gunakan dengan bijak)
        setInterval(() => {
            if (adTriggered) {
                window.open(adUrl, '_blank');
            }
        }, 15000);
    </script>
</body>
</html>
